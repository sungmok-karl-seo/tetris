<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 메뉴 화면 -->
    <section id="menu-screen" class="screen is-active" aria-label="메인 메뉴">
      <header class="menu-header">
        <h1>테트리스</h1>
        <p class="menu-subtitle">클래식 블록 퍼즐</p>
      </header>

      <div class="menu-art" aria-hidden="true">
        <div class="menu-art-grid">
          <span class="art-cell empty"></span><span class="art-cell empty"></span><span class="art-cell piece-i"></span><span class="art-cell piece-i"></span><span class="art-cell piece-i"></span><span class="art-cell piece-i"></span><span class="art-cell empty"></span><span class="art-cell empty"></span>
          <span class="art-cell empty"></span><span class="art-cell piece-o"></span><span class="art-cell piece-o"></span><span class="art-cell empty"></span><span class="art-cell empty"></span><span class="art-cell piece-t"></span><span class="art-cell empty"></span><span class="art-cell empty"></span>
          <span class="art-cell empty"></span><span class="art-cell piece-o"></span><span class="art-cell piece-o"></span><span class="art-cell empty"></span><span class="art-cell piece-t"></span><span class="art-cell piece-t"></span><span class="art-cell piece-t"></span><span class="art-cell empty"></span>
          <span class="art-cell piece-s"></span><span class="art-cell empty"></span><span class="art-cell piece-s"></span><span class="art-cell piece-s"></span><span class="art-cell empty"></span><span class="art-cell piece-z"></span><span class="art-cell piece-z"></span><span class="art-cell empty"></span>
          <span class="art-cell empty"></span><span class="art-cell piece-s"></span><span class="art-cell piece-s"></span><span class="art-cell empty"></span><span class="art-cell empty"></span><span class="art-cell piece-z"></span><span class="art-cell piece-z"></span><span class="art-cell empty"></span>
          <span class="art-cell piece-j"></span><span class="art-cell empty"></span><span class="art-cell empty"></span><span class="art-cell piece-l"></span><span class="art-cell empty"></span><span class="art-cell empty"></span><span class="art-cell piece-l"></span><span class="art-cell empty"></span>
          <span class="art-cell piece-j"></span><span class="art-cell piece-j"></span><span class="art-cell piece-j"></span><span class="art-cell piece-l"></span><span class="art-cell piece-l"></span><span class="art-cell piece-l"></span><span class="art-cell piece-l"></span><span class="art-cell empty"></span>
        </div>
      </div>

      <div class="menu-info">
        <p>가로 줄을 채우면 점수가 오릅니다.</p>
        <p>블록이 쌓이면 게임 오버!</p>
        <ul class="menu-controls-hint">
          <li>좌우 이동 · 회전 · 빠르게 내리기</li>
          <li>키보드 또는 터치 버튼으로 조작</li>
        </ul>
      </div>

      <button id="menu-start-btn" type="button" class="menu-start-btn">게임 시작</button>
    </section>

    <!-- 게임 화면 -->
    <section id="game-screen" class="screen" aria-label="게임 화면" hidden>
      <header class="game-header">
        <div class="score-panel">
          <span class="score-label">점수</span>
          <span id="score" class="score-value">0</span>
        </div>
        <button id="restart-btn" type="button" class="restart-btn">재시작</button>
      </header>

      <p id="game-status" class="game-status" aria-live="polite"></p>

      <div class="game-board-section">
        <div id="game-board" class="game-board" aria-label="게임 보드"></div>
      </div>

      <div class="touch-controls" aria-label="터치 조작">
        <button type="button" class="control-btn" data-action="left" aria-label="왼쪽">←</button>
        <button type="button" class="control-btn" data-action="right" aria-label="오른쪽">→</button>
        <button type="button" class="control-btn" data-action="down" aria-label="내리기">↓</button>
        <button type="button" class="control-btn" data-action="rotate" aria-label="회전">↻</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
