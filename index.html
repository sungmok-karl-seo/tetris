<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>테트리스</h1>
    </header>

    <main class="game-layout">
      <section class="game-board-section">
        <div id="game-board" class="game-board" aria-label="게임 보드"></div>
      </section>

      <aside class="game-info">
        <div class="score-panel">
          <h2>점수</h2>
          <p id="score" class="score-value">0</p>
          <p id="game-status" class="game-status" aria-live="polite"></p>
        </div>

        <div class="button-panel">
          <button id="start-btn" type="button">시작</button>
          <button id="restart-btn" type="button">재시작</button>
        </div>

        <div class="controls-panel">
          <h2>조작법</h2>
          <p class="controls-note">시작 버튼을 누른 후 키보드로 조작할 수 있습니다. 모바일에서는 블루투스 키보드 또는 화면 키보드(화살표 키)가 필요합니다.</p>
          <ul>
            <li><kbd>←</kbd> : 왼쪽 이동</li>
            <li><kbd>→</kbd> : 오른쪽 이동</li>
            <li><kbd>↓</kbd> : 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> : 블록 회전</li>
            <li><kbd>Space</kbd> : hard drop (즉시 낙하)</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
